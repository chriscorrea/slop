version: "2"

run:
  timeout: 3m
  go: '1.26'

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - gocritic
  exclusions:
    rules:
      # ignore errcheck warnings in test files
      - path: _test\.go
        linters:
          - errcheck

      # ignore false positive gosec warning about weak random numbers for jitter
      - linters:
          - gosec
        text: "G404: Use of weak random number generator"

      # ignore file permission warnings for test files only
      - path: _test\.go
        linters:
          - gosec
        text: "G306: Expect WriteFile permissions to be 0600 or less"

      # fake API key strings in test fixtures are not real credentials
      - path: _test\.go
        linters:
          - gosec
        text: "G101:"

      # test directory creation doesn't need strict permissions
      - path: _test\.go
        linters:
          - gosec
        text: "G301:"

      # file paths in providers and manifest come from internal config, not user input
      - path: "(internal/data/providers|internal/manifest/manager)\\.go"
        linters:
          - gosec
        text: "G304:"

formatters:
  enable:
    - gofmt
    - goimports
